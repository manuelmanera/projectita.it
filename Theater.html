<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --accent: #ffc107; --danger: #e74c3c; --success: #238636; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        
        .admin-panel { background: var(--accent); padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; color: black; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; }
        
        .btn-admin, .mgr-btns, #btn-dev-only, #btn-save-titles, #btn-evento-admin { display: none !important; }
        body.manager-active .btn-admin, body.manager-active .mgr-btns, body.manager-active #btn-evento-admin { display: inline-block !important; }
        body.dev-mode #btn-dev-only { display: inline-block !important; }
        body.can-edit-titles #btn-save-titles { display: inline-block !important; }

        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .banner-box { background: #800000; padding: 20px; text-align: center; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; outline: none; }
        
        #timer-display { background: #1c2128; border: 2px solid var(--accent); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px; display: none; }
        #timer-countdown { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .avviso-card { background: #0d1117; border-left: 5px solid var(--accent); padding: 18px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .allegato-img { max-width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }
        .btn-pdf { display: inline-block; background: #e74c3c; color: white; padding: 10px; border-radius: 5px; text-decoration: none; margin-top: 10px; font-size: 0.8rem; }

        .comment-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #333; }
        .commento { background: #161b22; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 0.8rem; border: 1px solid #222; }
        .input-commento { width: 100%; padding: 8px; background: #0b0e14; border: 1px solid #333; color: white; border-radius: 6px; margin-top: 8px; box-sizing: border-box; }

        .input-admin { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 450px; margin: 40px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        
        .user-row { display: flex; align-items: center; gap: 5px; background: #0d1117; padding: 8px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #333; }
        .user-row input { background: #161b22; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; width: 30%; font-size: 0.75rem; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <button id="btn-login-main" onclick="window.apriLogin()">🔐 Accedi</button>
        <button class="btn-admin" onclick="document.getElementById('nuovo-avviso-box').style.display='block'">+ Nuovo Avviso</button>
        <button id="btn-evento-admin" onclick="document.getElementById('modal-evento').style.display='block'" style="background:#ff6600; color:white;">⏲️ Timer</button>
        <button id="btn-dev-only" onclick="window.apriPannelloDev()" style="background:white; color:black;">⚙️ Utenti</button>
        <button id="btn-save-titles" onclick="window.salvaTuttoBanner()" style="background:#1f6feb; color:white;">💾 Salva Titoli</button>
        <button class="btn-admin" onclick="location.reload()" style="background:var(--danger); color:white;">Esci</button>
    </div>

    <div class="container">
        <div id="banner-titolo" class="banner-box" style="font-size:2rem; font-weight:900;">GRUPPO ORATORIO</div>
        <div id="banner-desc" class="banner-box">Comunicazioni Ufficiali</div>

        <div id="timer-display">
            <div id="timer-nome" style="color:gray; font-size:0.8rem;"></div>
            <div id="timer-countdown"></div>
        </div>

        <div id="nuovo-avviso-box" style="display:none; background:var(--card); padding:15px; border-radius:10px; border:2px solid var(--accent); margin-bottom:20px;">
            <textarea id="testo-nuovo" class="input-admin" rows="3" placeholder="Scrivi avviso..."></textarea>
            <label style="font-size: 0.8rem; color: #aaa;">Allega Immagine o PDF (max 2MB):</label>
            <input type="file" id="file-nuovo" class="input-admin" accept="image/*,.pdf" style="font-size: 0.8rem;">
            <button id="btn-pubblica" onclick="window.pubblicaNuovo()" style="width:100%; background:var(--success); color:white;">PUBBLICA AVVISO</button>
            <button onclick="document.getElementById('nuovo-avviso-box').style.display='none'" style="width:100%; background:none; color:gray; margin-top:5px;">Annulla</button>
        </div>
        
        <div id="area-bacheca">Caricamento bacheca...</div>
    </div>

    <div id="modal-dev" class="modal"><div class="modal-content">
        <h3>👥 Gestione Utenti</h3>
        <input type="text" id="new-u" class="input-admin" placeholder="Username">
        <input type="text" id="new-p" class="input-admin" placeholder="Password">
        <button onclick="window.aggiungiUtente()" style="width:100%; background:var(--success); color:white; margin-bottom:10px;">AGGIUNGI</button>
        <div id="lista-utenti-container" style="max-height:300px; overflow-y:auto; border-top:1px solid #333; padding-top:10px;"></div>
        <button onclick="document.getElementById('modal-dev').style.display='none'" style="width:100%; background:#eee; color:black; margin-top:15px;">Chiudi</button>
    </div></div>

    <div id="modal-evento" class="modal"><div class="modal-content">
        <h3>⏲️ Imposta Timer</h3>
        <input type="text" id="ev-nome" class="input-admin" placeholder="Nome Evento">
        <input type="datetime-local" id="ev-data" class="input-admin">
        <button onclick="window.salvaEvento()" style="width:100%; background:var(--success); color:white; margin-bottom:10px;">SALVA</button>
        <button onclick="document.getElementById('modal-evento').style.display='none'" style="width:100%; background:var(--danger); color:white;">Chiudi</button>
    </div></div>

    <div id="modal-login" class="modal"><div class="modal-content">
        <h3>🔐 Login</h3>
        <input type="text" id="l-user" class="input-admin" placeholder="Username">
        <input type="password" id="l-pass" class="input-admin" placeholder="Password">
        <button onclick="window.eseguiLogin()" style="width:100%; background:var(--accent); color:black;">ACCEDI</button>
        <button onclick="document.getElementById('modal-login').style.display='none'" style="width:100%; background:none; color:gray; margin-top:10px;">Chiudi</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c", 
            databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let session = { user: "Ospite" };

        // --- GESTIONE BACHECA E ALLEGATI ---
        onValue(ref(db, 'teatro/bacheca_dati'), (snap) => {
            const area = document.getElementById('area-bacheca');
            area.innerHTML = "";
            const dati = snap.val() || {};
            Object.keys(dati).reverse().forEach(id => {
                const a = dati[id];
                
                // Gestione file allegato
                let fileHTML = "";
                if(a.fileData) {
                    if(a.fileType.includes("image")) {
                        fileHTML = `<img src="${a.fileData}" class="allegato-img">`;
                    } else if(a.fileType.includes("pdf")) {
                        fileHTML = `<a href="${a.fileData}" target="_blank" class="btn-pdf">📄 Apri Allegato PDF</a>`;
                    }
                }

                let comms = "";
                if(a.commenti) {
                    Object.values(a.commenti).forEach(c => {
                        comms += `<div class="commento"><b style="color:var(--accent); font-size:0.7rem;">${c.autore}:</b> ${c.testo}</div>`;
                    });
                }

                area.innerHTML += `
                    <div class="avviso-card">
                        <div style="white-space:pre-wrap;">${a.testo}</div>
                        ${fileHTML}
                        <div class="mgr-btns"><button onclick="window.eliminaAvviso('${id}')" style="background:red; color:white; margin-top:10px; font-size:10px;">Elimina</button></div>
                        <div class="comment-section">
                            <div id="comments-${id}">${comms}</div>
                            <input type="text" class="input-commento" placeholder="Scrivi un commento..." onkeydown="if(event.key==='Enter') window.inviaCommento('${id}', this.value); if(event.key==='Enter') this.value='';">
                        </div>
                    </div>`;
            });
        });

        window.pubblicaNuovo = async () => {
            const txt = document.getElementById('testo-nuovo').value;
            const fileInput = document.getElementById('file-nuovo');
            const btn = document.getElementById('btn-pubblica');
            
            if(!txt && !fileInput.files[0]) return;
            
            btn.disabled = true;
            btn.innerText = "Caricamento...";

            let fileData = null;
            let fileType = null;

            if(fileInput.files[0]) {
                const file = fileInput.files[0];
                if(file.size > 2200000) { alert("File troppo grande! Massimo 2MB."); btn.disabled = false; btn.innerText = "PUBBLICA AVVISO"; return; }
                
                fileData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
                fileType = file.type;
            }

            push(ref(db, 'teatro/bacheca_dati'), { 
                testo: txt, 
                autore: session.user, 
                data: new Date().toLocaleDateString(),
                fileData: fileData,
                fileType: fileType
            }).then(() => {
                document.getElementById('testo-nuovo').value = "";
                document.getElementById('file-nuovo').value = "";
                document.getElementById('nuovo-avviso-box').style.display = 'none';
                btn.disabled = false;
                btn.innerText = "PUBBLICA AVVISO";
            });
        };

        window.inviaCommento = (id, txt) => {
            if(!txt.trim()) return;
            push(ref(db, `teatro/bacheca_dati/${id}/commenti`), { testo: txt, autore: session.user });
        };

        window.eliminaAvviso = (id) => { if(confirm("Eliminare definitivamente l'avviso?")) remove(ref(db, `teatro/bacheca_dati/${id}`)); };

        // --- GESTIONE UTENTI ---
        onValue(ref(db, 'teatro/utenti'), (snap) => {
            const cont = document.getElementById('lista-utenti-container');
            cont.innerHTML = "";
            const u = snap.val() || {};
            for(let id in u) {
                cont.innerHTML += `<div class="user-row">
                    <input type="text" value="${u[id].username}" id="u-${id}">
                    <input type="text" value="${u[id].password}" id="p-${id}">
                    <button onclick="window.saveU('${id}')" style="background:green; color:white;">💾</button>
                    <button onclick="window.remU('${id}')" style="background:red; color:white;">🗑️</button>
                </div>`;
            }
        });

        window.saveU = (id) => update(ref(db, `teatro/utenti/${id}`), { username: document.getElementById(`u-${id}`).value, password: document.getElementById(`p-${id}`).value }).then(()=>alert("Aggiornato!"));
        window.remU = (id) => { if(confirm("Eliminare questo utente?")) remove(ref(db, `teatro/utenti/${id}`)); };
        window.aggiungiUtente = () => {
            const u = document.getElementById('new-u').value;
            const p = document.getElementById('new-p').value;
            if(u && p) { push(ref(db, 'teatro/utenti'), { username: u, password: p }); document.getElementById('new-u').value=""; document.getElementById('new-p').value=""; }
        };

        window.apriPannelloDev = () => document.getElementById('modal-dev').style.display = 'block';

        // --- LOGIN & TIMER ---
        window.apriLogin = () => document.getElementById('modal-login').style.display = 'block';
        window.eseguiLogin = () => {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            if(u === "manuel.manera" && p === "PeppinoBomber") attivaSessione("admin", u);
            else {
                onValue(ref(db, 'teatro/utenti'), (s) => {
                    let ok = false; const users = s.val() || {};
                    for(let id in users) { if(users[id].username === u && users[id].password === p) { attivaSessione("manager", u); ok = true; break; } }
                    if(!ok) alert("Accesso negato!");
                }, {onlyOnce: true});
            }
        };

        function attivaSessione(tipo, nome) {
            session.user = nome;
            document.body.classList.add('manager-active');
            if(tipo === "admin") {
                document.body.classList.add('dev-mode', 'can-edit-titles');
                document.getElementById('banner-titolo').contentEditable = "true";
                document.getElementById('banner-desc').contentEditable = "true";
            }
            document.getElementById('modal-login').style.display = 'none';
            document.getElementById('btn-login-main').style.display = 'none';
        }

        window.salvaEvento = () => {
            const n = document.getElementById('ev-nome').value;
            const d = document.getElementById('ev-data').value;
            if(n && d) set(ref(db, 'teatro/evento'), { nome: n, data: d }).then(() => document.getElementById('modal-evento').style.display = 'none');
        };

        onValue(ref(db, 'teatro/evento'), (snap) => {
            const ev = snap.val();
            if(ev && ev.data) {
                document.getElementById('timer-display').style.display = "block";
                document.getElementById('timer-nome').innerText = ev.nome;
                setInterval(() => {
                    const diff = new Date(ev.data).getTime() - new Date().getTime();
                    const d = Math.floor(diff / 86400000);
                    const h = Math.floor((diff % 86400000) / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timer-countdown').innerText = diff > 0 ? `${d}g ${h}h ${m}m ${s}s` : "IN CORSO";
                }, 1000);
            }
        });

        window.salvaTuttoBanner = () => {
            update(ref(db, 'teatro/titoli'), { t1: document.getElementById('banner-titolo').innerText, t2: document.getElementById('banner-desc').innerText }).then(() => alert("Titoli aggiornati!"));
        };

        onValue(ref(db, 'teatro/titoli'), (s) => {
            const t = s.val(); if(t) { document.getElementById('banner-titolo').innerText = t.t1; document.getElementById('banner-desc').innerText = t.t2; }
        });
    </script>
</body>
</html>
