<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-PROJECT | Manuel Manera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d0f12;
            --bg-card: #161a1f;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.1);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
        }

        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
        }

        .navbar { 
            background: rgba(13, 15, 18, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2d3748;
            padding: 20px 0;
        }

        .navbar-brand { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent) !important; letter-spacing: 2px; }

        .hero { padding: 100px 0 60px; text-align: center; }
        .hero h1 { font-weight: 800; font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .project-card { 
            background: var(--bg-card); 
            border: 1px solid #2d3748; 
            border-radius: 20px; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100%;
            position: relative;
        }

        .project-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .project-banner { 
            width: 100%; 
            aspect-ratio: 16/7; 
            object-fit: cover; 
            filter: grayscale(30%);
            transition: 0.4s;
        }
        .project-card:hover .project-banner { filter: grayscale(0%); }

        .card-body { padding: 25px; }
        .card-title { font-weight: 700; font-size: 1.25rem; margin-bottom: 8px; }
        .card-text { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; }

        #adminPanel { 
            display: none; 
            background: #1e252e; 
            border: 1px solid var(--accent); 
            border-radius: 24px; 
            padding: 40px; 
            margin-bottom: 60px;
            box-shadow: 0 0 30px var(--accent-dim);
        }

        .form-control { 
            background: #0d0f12; 
            border: 1px solid #2d3748; 
            color: #fff; 
            border-radius: 12px; 
            padding: 12px 15px;
        }
        .form-control:focus { background: #161a1f; border-color: var(--accent); box-shadow: none; color: #fff; }

        .btn-accent { 
            background: var(--accent); 
            color: #000; 
            font-weight: 700; 
            border-radius: 12px; 
            padding: 12px 25px;
            border: none;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 68, 68, 0.9);
            border: none;
            color: white;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">THE_VAULT.SYS</a>
            <button class="btn btn-outline-light btn-sm px-4" style="border-radius: 10px;" onclick="handleAuth()">Access</button>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>M-PROJECT</h1>
            <p style="color: var(--text-dim);">All the projects of Manuel Manera</p>
        </div>
    </header>

    <div class="container py-4">
        <div id="adminPanel">
            <h4 class="mb-4 fw-bold" style="color: var(--accent)">UPDATE_SEQUENCE</h4>
            <div class="row g-3">
                <div class="col-md-3"><input type="text" id="tit" class="form-control" placeholder="Project Name"></div>
                <div class="col-md-3"><input type="text" id="lnk" class="form-control" placeholder="Link (https://...)"></div>
                <div class="col-md-3"><input type="file" id="img" class="form-control"></div>
                <div class="col-md-2"><input type="text" id="dsc" class="form-control" placeholder="Details"></div>
                <div class="col-md-1"><button class="btn btn-accent w-100" onclick="upload()">+</button></div>
            </div>
            <div id="status" style="display:none;" class="mt-3 text-center small text-info">Sincronizzazione...</div>
            <div class="mt-4 pt-3 border-top border-dark">
                <button class="btn btn-sm btn-outline-danger" onclick="logout()">Terminate session</button>
            </div>
        </div>

        <main id="grid" class="row g-4"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAu6exLNfCQ8D" + "5U8yzYtZXKMlX2BELyQMI",
            authDomain: "sito-manuel-75af9.firebaseapp.com",
            databaseURL: "https://sito-manuel-75af9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "sito-manuel-75af9"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        const i_k = "b2bd2cbba6ca" + "0679055dc317" + "aa5bf613";

        // Password integrata
        const _p1 = "Manuel";
        const _p2 = "257103";
        const ACCESS_KEY = _p1 + _p2;

        window.handleAuth = () => {
            const inserita = prompt("Access Key Required:");
            if (!inserita) return;
            if (inserita === ACCESS_KEY) {
                localStorage.setItem("session_active", "true");
                alert("Access Granted.");
                location.reload();
            } else {
                alert("Access Denied.");
            }
        };

        window.logout = () => {
            localStorage.removeItem("session_active");
            location.reload();
        };

        window.upload = async () => {
            const f = document.getElementById('img').files[0];
            const t = document.getElementById('tit').value;
            const l = document.getElementById('lnk').value;
            const d = document.getElementById('dsc').value;

            if(!f || !t || !l) return alert("Missing required fields.");

            document.getElementById('status').style.display = 'block';
            const fd = new FormData(); fd.append("image", f);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${i_k}`, { method: "POST", body: fd });
                const json = await res.json();
                if(json.success) {
                    await push(ref(db, 'progetti'), { t, l, d, i: json.data.url });
                    location.reload();
                }
            } catch(e) { alert("Upload error."); }
        };

        window.removeItem = async (id) => {
            if(confirm("Confirm deletion?")) await remove(ref(db, `progetti/${id}`));
        };

        function start() {
            const auth = localStorage.getItem("session_active") === "true";
            if(auth) document.getElementById('adminPanel').style.display = 'block';

            onValue(ref(db, 'progetti'), (s) => {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                s.forEach((c) => {
                    const v = c.val();
                    grid.innerHTML += `
                        <div class="col-md-6 col-lg-4">
                            <div class="project-card">
                                ${auth ? `<button class="delete-btn" onclick="removeItem('${c.key}')">REMOVE</button>` : ''}
                                <img src="${v.i}" class="project-banner">
                                <div class="card-body">
                                    <h5 class="card-title text-white">${v.t}</h5>
                                    <p class="card-text">${v.d || ''}</p>
                                    <a href="${v.l}" target="_blank" class="btn btn-outline-info w-100 mt-2" style="border-radius: 10px;">OPEN_LINK</a>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }
        start();
    </script>
</body>
</html>
